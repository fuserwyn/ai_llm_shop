version: '3.8'

services:
  bot:
    build: .
    command: python bot/main.py
    env_file:
      - .env
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
